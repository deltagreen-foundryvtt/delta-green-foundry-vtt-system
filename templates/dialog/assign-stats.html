<form class="assign-stats-dialog">
    <p class="assign-stats-remaining" data-points-remaining>
        {{localize "DG.ProfessionSetup.AssignStats.PointsRemaining" remaining=remaining}}
    </p>
    <div class="assign-stats-rows">
        {{#each stats}}
        <label class="assign-stats-row">
            <span class="assign-stats-label">{{label}}</span>
            <input type="number"
                   name="stat-{{key}}"
                   data-stat-key="{{key}}"
                   value="{{lookup ../values key}}"
                   min="{{@root.statMin}}"
                   max="{{@root.statMax}}"
                   data-dtype="Number" />
        </label>
        {{/each}}
    </div>
</form>
